services:
  #Python
  tracker:
    build: .
    container_name: bus_tracker
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    restart: always

  db:
    image: postgres:15-alpine
    container_name: bus_postgres
    env_file:
      - .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes: 
  pg_data: